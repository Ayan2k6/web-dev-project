
<div class="app-shell">
  <header class="topbar">
    <a class="brand" routerLink="/home">
      <span class="brand-icon">K</span>
      <span class="brand-text">KBTU Hub</span>
    </a>

    <a class="profile-chip" routerLink="/profile">
      <div class="avatar">{{ (me?.username || 'U')[0].toUpperCase() }}</div>
      <div class="profile-info">
        <strong>{{ me?.username || 'User' }}</strong>
        <small>{{ me?.role || 'member' }}</small>
      </div>
    </a>
  </header>

  <main class="page-wrap">
    <router-outlet></router-outlet>
  </main>

  <nav class="bottom-nav" *ngIf="isLoggedIn">
    <a routerLink="/home" routerLinkActive="active" class="nav-item">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      <span>Лента</span>
    </a>
    <a routerLink="/profile" routerLinkActive="active" class="nav-item">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      <span>Сеть</span>
    </a>
    <a routerLink="/chats" routerLinkActive="active" class="nav-item">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
      </svg>
      <span>Чаты</span>
    </a>
  </nav>
</div>
